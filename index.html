<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl lg:col-span-2">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-flag-checkered text-indigo-500"></i>
                    <h3 class="font-bold text-base text-slate-200">Current Journey Summary</h3>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-slate-950/50 border border-slate-800/40 p-4 rounded-xl flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-rose-500/10 text-rose-500 rounded-lg flex items-center justify-center"><i class="fa-solid fa-crown"></i></div>
                            <span class="text-sm font-medium text-slate-400">Maximum Speed</span>
                        </div>
                        <div class="text-right">
                            <span id="maxSpeed" class="text-xl font-black text-white">0</span> <span class="text-xs text-slate-500">km/h</span>
                        </div>
                    </div>
                    <div class="bg-slate-950/50 border border-slate-800/40 p-4 rounded-xl flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-indigo-500/10 text-indigo-500 rounded-lg flex items-center justify-center"><i class="fa-solid fa-calculator"></i></div>
                            <span class="text-sm font-medium text-slate-400">Average Speed</span>
                        </div>
                        <div class="text-right">
                            <span id="avgSpeed" class="text-xl font-black text-white">0</span> <span class="text-xs text-slate-500">km/h</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left text-amber-500"></i>
                        <h3 class="font-bold text-base text-slate-200">Recent History (Max 3)</h3>
                    </div>
                    <button onclick="clearHistory()" class="text-[10px] text-slate-400 hover:text-rose-400 font-bold tracking-wider uppercase cursor-pointer">Clear</button>
                </div>
                
                <div id="historyLogContainer" class="space-y-3 max-h-[160px] overflow-y-auto pr-1">
                    <p class="text-xs text-slate-500 text-center py-4">No previous journey recorded.</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        function requestNotificationPermission() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    alert("Notification Status: " + permission);
                    if (permission === "granted") {
                        new Notification("🚨 SYSTEM ONLINE", {
                            body: "Telemetry system successfully linked to your device notification center!"
                        });
                    }
                });
            } else {
                alert("This browser does not support system push notifications.");
            }
        }
        window.requestNotificationPermission = requestNotificationPermission;
    </script>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
